/* ── REVEAL ANIMATION ─── */
function useHomeReveal(threshold) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(true);
  const [hasSetup, setHasSetup] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el || !('IntersectionObserver' in window)) return;
    const timer = setTimeout(() => {
      const rect = el.getBoundingClientRect();
      const inView = rect.top < window.innerHeight && rect.bottom > 0;
      if (!inView) { setVisible(false); setHasSetup(true); }
    }, 50);
    return () => clearTimeout(timer);
  }, []);

  useEffect(() => {
    if (!hasSetup) return;
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: threshold || 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [hasSetup]);

  return [ref, visible];
}

function HomeReveal({ children, delay, style }) {
  const [ref, visible] = useHomeReveal(0.08);
  const d = delay || 0;
  return (
    <div ref={ref} style={{
      ...style,
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(22px)',
      transition: `opacity 0.6s ease ${d}s, transform 0.6s ease ${d}s`,
    }}>
      {children}
    </div>
  );
}
